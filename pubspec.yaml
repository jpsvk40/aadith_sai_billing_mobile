name: aadith_sai_billing_mobile
description: "Aadith Sai Cloud Billing Mobile App"
publish_to: 'none'
version: 1.0.0+23

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0   # WhatsApp brand icon on send buttons (v11 = IconData-final fix for Flutter 3.44)
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  flutter_dotenv: ^5.2.1
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  record: ^7.1.0          # mic capture for "Ask your business" voice
  path_provider: ^2.1.0   # temp dir for the recorded clip
  flutter_tts: ^4.0.0     # speak the assistant's answers (on-device TTS)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  # Android adaptive icon (Android 8.0+): blue logo centered on white
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
