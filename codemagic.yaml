workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Prepare environment file
        script: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL:-https://aadith-sai-billing-cloud-4g5n.onrender.com}
          APP_NAME=${APP_NAME:-Aadith Sai Billing}
          EOF
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Run analyzer
        script: |
          flutter analyze
      - name: Run tests
        script: |
          flutter test
      - name: Build release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: aadith-appstore
    environment:
      flutter: stable
      # Apple requires apps built with the iOS 26 SDK (Xcode 26+) for App Store uploads.
      # The earlier "module not found" failures were a pod-integration bug (fixed by
      # building via `flutter build ios`), not Xcode 26 itself.
      xcode: latest
      ios_signing:
        certificates:
          - aadith sai billing
        provisioning_profiles:
          - aadith-sai-billing-profile
    triggering:
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Prepare environment file
        script: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL:-https://aadith-sai-billing-cloud-4g5n.onrender.com}
          APP_NAME=${APP_NAME:-Aadith Sai Billing}
          EOF
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Run analyzer
        script: |
          flutter analyze
      - name: Run tests
        script: |
          flutter test
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set up Flutter iOS + pods
        script: |
          # Standalone `pod install` integrated only flutter_secure_storage (the iOS
          # plugin manifest pod install saw was incomplete). Let Flutter regenerate the
          # iOS config + plugin registrant and run pod install with the full plugin set.
          flutter precache --ios
          flutter pub get
          # Avoid the "build number already used" App Store upload error by building one past the
          # latest build already on TestFlight. Set APP_STORE_APPLE_ID (numeric Apple app id, from
          # App Store Connect -> App Information -> "Apple ID") in Codemagic env vars to enable this;
          # if it's unset we fall back to the build number in pubspec.yaml (version: x.y.z+N).
          BUILD_NUMBER_ARG=""
          if [ -n "$APP_STORE_APPLE_ID" ]; then
            LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "")
            if [ -n "$LATEST" ]; then
              BUILD_NUMBER_ARG="--build-number=$((LATEST + 1))"
              echo "Latest TestFlight build = $LATEST -> building with $BUILD_NUMBER_ARG"
            fi
          fi
          flutter build ios --release --no-codesign $BUILD_NUMBER_ARG
          echo "===== Podfile.lock PODS after flutter build ====="
          sed -n '/^PODS:/,/^DEPENDENCIES:/p' ios/Podfile.lock || true
      - name: Build IPA
        script: |
          # Xcode 26's "Explicitly Built Modules" (ScanDependencies) fails compiling
          # Flutter's GeneratedPluginRegistrant; disable it to use legacy implicit modules.
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO CLANG_ENABLE_EXPLICIT_MODULES=NO SWIFT_ENABLE_EXPLICIT_MODULES=NO" \
          || { echo "================= XCODEBUILD ERRORS ================="; \
               grep -rhiE "error:|fatal error:|no such module" /tmp/xcodebuild_logs/ 2>/dev/null | sort -u | tail -80; \
               echo "===================================================="; exit 1; }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
