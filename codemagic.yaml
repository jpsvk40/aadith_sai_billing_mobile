workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Prepare environment file
        script: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL:-https://aadith-sai-billing-cloud-4g5n.onrender.com}
          APP_NAME=${APP_NAME:-Aadith Sai Billing}
          EOF
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Run analyzer
        script: |
          flutter analyze
      - name: Run tests
        script: |
          flutter test
      - name: Build release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: aadith-appstore
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        certificates:
          - aadith sai billing
        provisioning_profiles:
          - aadith-sai-billing-profile
    triggering:
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Prepare environment file
        script: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL:-https://aadith-sai-billing-cloud-4g5n.onrender.com}
          APP_NAME=${APP_NAME:-Aadith Sai Billing}
          EOF
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Run analyzer
        script: |
          flutter analyze
      - name: Run tests
        script: |
          flutter test
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
