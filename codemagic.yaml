workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Prepare environment file
        script: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL:-https://aadith-sai-billing-cloud-4g5n.onrender.com}
          APP_NAME=${APP_NAME:-Aadith Sai Billing}
          EOF
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Run analyzer
        script: |
          flutter analyze
      - name: Run tests
        script: |
          flutter test
      - name: Build release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - aadithsai.aadithSaiBillingMobile
        certificates:
          - aadith sai billing
    triggering:
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Prepare environment file
        script: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL:-https://aadith-sai-billing-cloud-4g5n.onrender.com}
          APP_NAME=${APP_NAME:-Aadith Sai Billing}
          EOF
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Run analyzer
        script: |
          flutter analyze
      - name: Run tests
        script: |
          flutter test
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Create export options plist
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>DZPXVJD63W</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.aadithsai.aadithSaiBillingMobile</key>
              <string>aadithsai.aadithSaiBillingMobile</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
